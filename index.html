　<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>価値観ボード（多言語版）</title>
  <style>
    :root {
      --bg: #fff9fc;
      --panel: #fff5fb;
      --panel-2: #fdf0f8;
      --card: #fbeefe;
      --chip: #f4d8ec;
      --chip-border: #e9c3e0;
      --border: #e6c7df;
      --text: #5a4268;
      --muted: #816793;
      --shadow: 0 8px 24px rgba(170, 109, 161, 0.08);
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --column-width: 360px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #fffafc 0%, #fff7fb 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1560px;
      margin: 0 auto;
      padding: 20px 14px 32px;
    }

    .topbar {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(230,199,223,0.7);
      border-radius: 28px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .lang-switcher {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .lang-btn {
      border: 1px solid var(--chip-border);
      background: var(--chip);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      font-weight: 600;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      box-shadow: 0 2px 8px rgba(170, 109, 161, 0.06);
    }

    .lang-btn.active {
      background: #eec6e3;
      box-shadow: inset 0 0 0 1px #ddadd0;
    }

    .lang-btn:active { transform: scale(0.98); }

    h1 {
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.15;
      margin: 0 0 10px;
      letter-spacing: .01em;
    }

    .description {
      margin: 0;
      font-size: clamp(16px, 2.2vw, 20px);
      line-height: 1.7;
      color: var(--muted);
    }

    .board-wrap {
      margin-top: 18px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, minmax(300px, var(--column-width)));
      gap: 18px;
      align-items: start;
      min-width: max-content;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255, 248, 252, 0.55);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-height: 420px;
    }

    .col-header {
      position: static;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 68px;
      padding: 16px 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f8e0f0 0%, #f7e7f6 100%);
      border: 1px solid var(--border);
      color: var(--text);
      flex: 0 0 auto;
    }

    .col-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .01em;
      margin: 0;
      white-space: nowrap;
    }

    .count {
      flex: 0 0 auto;
      min-width: 48px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.45);
      border: 1px solid var(--border);
      text-align: center;
      font-weight: 800;
      font-size: 15px;
      color: var(--muted);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0;
      margin: 0;
      min-height: 160px;
    }

    .card {
      background: linear-gradient(180deg, #fff4fb 0%, #f9eafe 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 6px 16px rgba(170, 109, 161, 0.06);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .actions + .actions {
      margin-top: 10px;
      grid-template-columns: repeat(2, 64px);
      justify-content: start;
    }

    .action {
      border: 1px solid var(--chip-border);
      background: #f8e7f5;
      color: var(--text);
      min-height: 48px;
      border-radius: 16px;
      font-size: 26px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
      user-select: none;
    }

    .action:active { transform: scale(0.97); }
    .action:hover { background: #f3ddee; }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255,255,255,0.4);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .page { padding: 14px 10px 24px; }
      .topbar { border-radius: 22px; padding: 14px; }
      .board { gap: 14px; grid-template-columns: repeat(6, minmax(300px, 86vw)); }
      .col { padding: 12px; border-radius: 24px; }
      .col-header { min-height: 60px; padding: 14px 16px; }
      .card { padding: 16px; }
      .card h3 { font-size: 18px; }
      .lang-switcher { gap: 8px; }
      .lang-btn { padding: 11px 16px; font-size: 14px; }
    }
  </style>
</head>

    const defaultState = {
      lang: 'ja',
      columns: [
        [...cardKeys],
        [],
        [],
        [],
        [],
        []
      ]
    };

    function normalizeState(saved) {
      const normalized = {
        lang: saved?.lang && translations[saved.lang] ? saved.lang : 'ja',
        columns: [[], [], [], [], [], []]
      };

      const seen = new Set();

      if (saved && Array.isArray(saved.columns)) {
        for (let i = 0; i < 6; i++) {
          const col = Array.isArray(saved.columns[i]) ? saved.columns[i] : [];
          col.forEach((key) => {
            if (cardKeys.includes(key) && !seen.has(key)) {
              normalized.columns[i].push(key);
              seen.add(key);
            }
          });
        }
      }

      cardKeys.forEach((key) => {
        if (!seen.has(key)) {
          normalized.columns[0].push(key);
        }
      });

      return normalized;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return JSON.parse(JSON.stringify(defaultState));
        const parsed = JSON.parse(raw);
        return normalizeState(parsed);
      } catch {
        return JSON.parse(JSON.stringify(defaultState));
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function moveCard(cardKey, targetCol) {
      let currentCol = -1;
      let currentIndex = -1;

      state.columns.forEach((col, colIndex) => {
        const idx = col.indexOf(cardKey);
        if (idx !== -1) {
          currentCol = colIndex;
          currentIndex = idx;
        }
      });

      if (currentCol === -1 || currentCol === targetCol) return;

      state.columns[currentCol].splice(currentIndex, 1);
      state.columns[targetCol].push(cardKey);
      saveState();
      render();
    }

    function reorder(cardKey, direction) {
      state.columns.forEach((col) => {
        const idx = col.indexOf(cardKey);
        if (idx === -1) return;
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= col.length) return;
        [col[idx], col[newIdx]] = [col[newIdx], col[idx]];
      });

      saveState();
      render();
    }

    function setLanguage(lang) {
      state.lang = lang;
      saveState();
      render();
    }

    function createAction(label, title, onClick) {
      const btn = document.createElement('button');
      btn.className = 'action';
      btn.type = 'button';
      btn.textContent = label;
      btn.title = title;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function render() {
      const t = translations[state.lang] || translations.ja;

      document.documentElement.lang = state.lang;
      document.getElementById('appTitle').textContent = t.title;
      document.getElementById('appDescription').textContent = t.description;

      const switcher = document.getElementById('langSwitcher');
      switcher.innerHTML = '';

      Object.entries(translations).forEach(([key, value]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'lang-btn' + (state.lang === key ? ' active' : '');
        btn.textContent = value.langName;
        btn.addEventListener('click', () => setLanguage(key));
        switcher.appendChild(btn);
      });

      const board = document.getElementById('board');
      board.innerHTML = '';

      state.columns.forEach((colCards, colIndex) => {
        const col = document.createElement('section');
        col.className = 'col';

        const header = document.createElement('div');
        header.className = 'col-header';
        header.innerHTML = `
          <h2 class="col-title">${t.columns[colIndex]}</h2>
          <div class="count">${colCards.length}</div>
        `;
        col.appendChild(header);

        const list = document.createElement('div');
        list.className = 'list';

        if (!colCards.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = t.empty;
          list.appendChild(empty);
        } else {
          colCards.forEach((cardKey) => {
            const cardData = t.cards[cardKey];
            if (!cardData) return;

            const card = document.createElement('article');
            card.className = 'card';

            const title = document.createElement('h3');
            title.textContent = cardData.title;

            const desc = document.createElement('p');
            desc.textContent = cardData.desc;

            const moveRow = document.createElement('div');
            moveRow.className = 'actions';
            ['≡','×','△','○','◎','★'].forEach((symbol, targetIndex) => {
              moveRow.appendChild(
                createAction(symbol, t.columns[targetIndex], () => moveCard(cardKey, targetIndex))
              );
            });

            const orderRow = document.createElement('div');
            orderRow.className = 'actions';
            orderRow.appendChild(createAction('↑', 'move up', () => reorder(cardKey, -1)));
            orderRow.appendChild(createAction('↓', 'move down', () => reorder(cardKey, 1)));

            card.append(title, desc, moveRow, orderRow);
            list.appendChild(card);
          });
        }

        col.appendChild(list);
        board.appendChild(col);
      });
    }

    saveState();
    render();
  </script>
