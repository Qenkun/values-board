<style>
  :root{
    --bg1:#fff7fb;
    --bg2:#f7f1ff;
    --panel:#fff8fd;
    --panel2:#f7eefe;
    --card:#ffe9f6;
    --card2:#f7ddff;
    --text:#4b335d;
    --muted:#7f6893;
    --border:#e7c9ea;
    --button:#f6d8ef;
    --button-active:#efc3e4;
    --radius:18px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--text);
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
  }
  .header{
    position:sticky; top:0; z-index:50;
    padding:14px 16px 12px;
    background:rgba(255,247,251,.94);
    border-bottom:1px solid rgba(140,95,160,.14);
    backdrop-filter:blur(10px);
  }
  .langbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  h1{margin:0;font-size:20px}
  .sub{
    margin-top:6px;
    color:var(--muted);
    font-size:12px;
    line-height:1.55;
  }

  .board-wrap{
    overflow-x:auto;
    padding:14px;
  }
  .board{
    display:grid;
    grid-template-columns:320px repeat(5, 250px);
    gap:12px;
    min-width:max-content;
    align-items:start;
  }

  .col{
    background:linear-gradient(180deg,var(--panel),#fff3fb);
    border:1px solid var(--border);
    border-radius:var(--radius);
    min-height:72vh;
    box-shadow:0 10px 24px rgba(192,139,182,.16);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .col-header{
    padding:12px 12px 10px;
    border-bottom:1px solid rgba(140,95,160,.12);
    background:rgba(255,248,253,.98);
    z-index:2;
    flex:0 0 auto;
  }
  .col-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    font-weight:700;
  }
  .symbol{
    width:24px;height:24px;border-radius:8px;
    display:inline-flex;align-items:center;justify-content:center;
    background:var(--panel2);
    border:1px solid rgba(140,95,160,.12);
    font-size:14px;
    flex:0 0 auto;
  }
  .badge{
    background:var(--panel2);
    border:1px solid rgba(140,95,160,.12);
    padding:3px 8px;
    border-radius:999px;
    font-size:12px;
    color:var(--muted);
    margin-left:auto;
    flex:0 0 auto;
  }

  .list{
    padding:12px 10px 10px;
    min-height:220px;
    flex:1 1 auto;
  }

  .card{
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid rgba(140,95,160,.14);
    border-radius:16px;
    padding:12px 12px 11px;
    margin:0 0 12px 0;
    box-shadow:0 6px 14px rgba(201,153,191,.12);
  }
  .card-title{
    font-size:15px;
    font-weight:700;
    line-height:1.35;
    margin-bottom:5px;
  }
  .card-desc{
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
    margin-bottom:9px;
  }

  .controls{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  button{
    appearance:none;
    border:none;
    background:var(--button);
    color:var(--text);
    border:1px solid rgba(140,95,160,.12);
    padding:8px 11px;
    border-radius:12px;
    font-size:12px;
    line-height:1;
    box-shadow:0 2px 6px rgba(192,139,182,.08);
  }
  button:active{
    transform:translateY(1px);
    background:var(--button-active);
  }
  button:disabled{
    opacity:.42;
  }
  .move{
    min-width:40px;
    font-weight:700;
  }
  .lang-btn.active{
    background:#eeb9de;
    font-weight:700;
  }
  .footer{
    padding:0 16px 18px;
    color:var(--muted);
    font-size:12px;
    line-height:1.5;
  }
</style>
</head>
<body>
  <div class="header" id="header">
    <div class="langbar" id="langbar"></div>
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="footer" id="footer"></div>

      purpose:["Propósito","Definir el sentido y la dirección de la vida"], devotion:["Devoción","Servir a alguien o a algo"], accuracy:["Precisión","Expresar con precisión opiniones y creencias"],
      courtesy:["Cortesía","Tratar a los demás con sinceridad y educación"], acceptance:["Aceptación","Ser aceptado tal como uno es"], humor:["Humor","Ver el lado divertido de la vida y del mundo"],
      passion:["Pasión","Sentir intensamente por ideas, actividades o personas"], flexibility:["Flexibilidad","Adaptarse fácilmente a nuevos entornos"], generosity:["Generosidad","Dar a otros lo que uno posee"],
      justice:["Justicia","Tratar a todas las personas con equidad"], rebellion:["Rebeldía","Cuestionar y oponerse a la autoridad o las reglas"], moderation:["Moderación","Evitar los excesos y encontrar el punto adecuado"],
      safety:["Seguridad","Sentir tranquilidad y seguridad"], attractiveness:["Atractivo","Mantener el atractivo físico"], fitness:["Condición física","Mantener un cuerpo fuerte y sano"],
      creativity:["Creatividad","Crear ideas nuevas y originales"], independence:["Independencia","Vivir sin depender de otros"], honesty:["Honestidad","Vivir con sinceridad y sin mentiras"],
      love:["Amor","Dar amor a alguien"], reality:["Realismo","Actuar de forma realista y práctica"], helpfulness:["Utilidad","Ser útil para otras personas"],
      solitude:["Soledad","Tener tiempo y espacio para estar solo"], growth:["Crecimiento","Seguir cambiando y creciendo"], aesthetics:["Estética","Apreciar las cosas bellas que te rodean"],
      family:["Familia","Construir una familia feliz y amorosa"], beingLoved:["Ser amado","Ser amado por las personas cercanas"], tolerance:["Tolerancia","Respetar y aceptar a quienes son diferentes"],
      mastery:["Dominio","Perfeccionarse en las tareas habituales"], fidelity:["Fidelidad","Ser fiel y honesto con la pareja"], selfKnowledge:["Autoconocimiento","Comprenderse profundamente a uno mismo"],
      forgiveness:["Perdón","Vivir perdonando a los demás"], challenge:["Desafío","Enfrentar cosas y problemas difíciles"], adventure:["Aventura","Tener experiencias nuevas y emocionantes"],
      knowledge:["Conocimiento","Aprender o crear conocimiento valioso"], faith:["Fe","Reflexionar sobre la voluntad de algo más grande que uno mismo"], spirituality:["Espiritualidad","Crecer y madurar espiritualmente"],
      presence:["Presencia","Concentrarse en este momento presente"], openness:["Apertura","Abrirse a nuevas experiencias, ideas y opciones"], sexuality:["Sexualidad","Tener una vida sexual activa y satisfactoria"],
      change:["Cambio","Vivir una vida variada y llena de cambios"], trust:["Confianza","Ser una persona confiable"], contribution:["Contribución","Hacer algo útil para la sociedad"],
      leisure:["Ocio","Relajarse y disfrutar del propio tiempo"], friendship:["Amistad","Construir amistades cercanas y solidarias"], health:["Salud","Vivir con buena salud y en buen estado"],
      selfControl:["Autocontrol","Controlar el propio comportamiento"], achievement:["Logro","Conseguir algo importante"]
    }
  };

  const UI_TEXT = {
    ja: {
      appTitle:"価値観ボード（多言語版）",
      subtitle:"ヘッダー上の言語ボタンで、日本語・韓国語・英語・スペイン語に切り替えできます。カードごとに、行きたい列の記号ボタンを押して移動できます。↑↓で列の中の順番を変更できます。自動保存されます。",
      footer:"使い方: カードの × △ ○ ◎ ★ ボタンでその列へ移動します。↑ ↓ でその列の中の順番を変更します。<br>左端の「≡」は価値観リストへ戻すボタンです。",
      columns:{pool:"価値観リスト",x:"バツ",triangle:"三角",circle:"丸",double:"二重丸",star:"星"},
      langs:{ja:"日本語",ko:"한국어",en:"English",es:"Español"}
    },
    en: {
      appTitle:"Values Board (Multilingual)",
      subtitle:"Use the language buttons above to switch between Japanese, Korean, English, and Spanish. For each card, tap a symbol button to move it to a column. Use ↑↓ to reorder within a column. Changes are saved automatically.",
      footer:"How to use: Tap × △ ○ ◎ ★ to move a card to that column. Use ↑ ↓ to change the order inside the same column.<br>The leftmost ≡ button sends the card back to the values list.",
      columns:{pool:"Values List",x:"X",triangle:"Triangle",circle:"Circle",double:"Double Circle",star:"Star"},
      langs:{ja:"Japanese",ko:"Korean",en:"English",es:"Spanish"}
    },
    ko: {
      appTitle:"가치관 보드 (다국어판)",
      subtitle:"위의 언어 버튼으로 일본어, 한국어, 영어, 스페인어로 전환할 수 있습니다. 각 카드에서 원하는 열의 기호 버튼을 눌러 이동할 수 있고, ↑↓로 같은 열 안에서 순서를 바꿀 수 있습니다. 자동 저장됩니다.",
      footer:"사용법: 카드의 × △ ○ ◎ ★ 버튼을 눌러 해당 열로 이동합니다. ↑ ↓ 로 같은 열 안의 순서를 바꿉니다.<br>맨 왼쪽의 ≡ 버튼은 가치관 목록으로 되돌리는 버튼입니다.",
      columns:{pool:"가치관 목록",x:"엑스",triangle:"삼각",circle:"원",double:"이중원",star:"별"},
      langs:{ja:"일본어",ko:"한국어",en:"영어",es:"스페인어"}
    },
    es: {
      appTitle:"Tablero de Valores (multilingüe)",
      subtitle:"Usa los botones de idioma de arriba para cambiar entre japonés, coreano, inglés y español. En cada tarjeta, toca un botón de símbolo para moverla a una columna. Usa ↑↓ para cambiar el orden dentro de la misma columna. Los cambios se guardan automáticamente.",
      footer:"Uso: Toca × △ ○ ◎ ★ para mover una tarjeta a esa columna. Usa ↑ ↓ para cambiar el orden dentro de la misma columna.<br>El botón ≡ de la izquierda devuelve la tarjeta a la lista de valores.",
      columns:{pool:"Lista de valores",x:"X",triangle:"Triángulo",circle:"Círculo",double:"Doble círculo",star:"Estrella"},
      langs:{ja:"Japonés",ko:"Coreano",en:"Inglés",es:"Español"}
    }
  };

  const COLS = [
    {id:"pool", symbol:"≡"},
    {id:"x", symbol:"×"},
    {id:"triangle", symbol:"△"},
    {id:"circle", symbol:"○"},
    {id:"double", symbol:"◎"},
    {id:"star", symbol:"★"}
  ];

  const KEY = "values-kanban-symbol-buttons-multilang-layout-v1";
  const LANG_KEY = "values-kanban-ui-lang-layout-v1";

  function escapeHtml(s){
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  }

  function makeDefaultState(){
    return {
      columns:{
        pool: VALUE_KEYS.map((key,i)=>({id:"v"+i,key:key})),
        x:[], triangle:[], circle:[], double:[], star:[]
      }
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(KEY);
      if(!raw) return makeDefaultState();
      const parsed = JSON.parse(raw);
      if(!parsed || !parsed.columns) return makeDefaultState();
      return parsed;
    }catch(e){
      return makeDefaultState();
    }
  }

  function loadLang(){
    const saved = localStorage.getItem(LANG_KEY);
    return UI_TEXT[saved] ? saved : "ja";
  }

  let state = loadState();
  let currentLang = loadLang();
  const board = document.getElementById("board");

  function save(){
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  function saveLang(){
    localStorage.setItem(LANG_KEY, currentLang);
  }

  function getValueText(key){
    return VALUE_TEXT[currentLang][key] || VALUE_TEXT.ja[key];
  }

  function setLanguage(lang){
    currentLang = lang;
    document.documentElement.lang = lang;
    saveLang();
    render();
  }

  function findCard(cardId){
    for(const colId in state.columns){
      const idx = state.columns[colId].findIndex(c => c.id === cardId);
      if(idx !== -1){
        return {colId, idx, card: state.columns[colId][idx]};
      }
    }
    return null;
  }

  function moveToColumn(cardId, targetCol){
    const found = findCard(cardId);
    if(!found || found.colId === targetCol) return;
    state.columns[found.colId].splice(found.idx, 1);
    state.columns[targetCol].push(found.card);
    save();
    render();
  }

  function moveWithin(cardId, direction){
    const found = findCard(cardId);
    if(!found) return;
    const arr = state.columns[found.colId];
    const newIndex = found.idx + direction;
    if(newIndex < 0 || newIndex >= arr.length) return;
    const item = arr.splice(found.idx, 1)[0];
    arr.splice(newIndex, 0, item);
    save();
    render();
  }

  function renderLangBar(){
    const t = UI_TEXT[currentLang];
    const langbar = document.getElementById("langbar");
    langbar.innerHTML = "";
    ["ja","ko","en","es"].forEach(lang => {
      const btn = document.createElement("button");
      btn.className = "lang-btn" + (lang === currentLang ? " active" : "");
      btn.textContent = t.langs[lang];
      btn.addEventListener("click", () => setLanguage(lang));
      langbar.appendChild(btn);
    });
    document.getElementById("title").textContent = t.appTitle;
    document.getElementById("subtitle").textContent = t.subtitle;
    document.getElementById("footer").innerHTML = t.footer;
  }

  function render(){
    renderLangBar();
    board.innerHTML = "";
    const t = UI_TEXT[currentLang];

    for(const meta of COLS){
      const section = document.createElement("section");
      section.className = "col";

      const header = document.createElement("div");
      header.className = "col-header";
      header.innerHTML = `
        <div class="col-title">
          <span class="symbol">${meta.symbol}</span>
          <span>${escapeHtml(t.columns[meta.id])}</span>
          <span class="badge">${state.columns[meta.id].length}</span>
        </div>
      `;
      section.appendChild(header);

      const list = document.createElement("div");
      list.className = "list";

      state.columns[meta.id].forEach((card, idx) => {
        const canUp = idx > 0;
        const canDown = idx < state.columns[meta.id].length - 1;
        const [title, desc] = getValueText(card.key);

        const targetButtons = COLS.map(col => {
          const disabled = col.id === meta.id ? "disabled" : "";
          return `<button class="move" data-action="moveTo" data-target="${col.id}" data-card-id="${card.id}" ${disabled}>${col.symbol}</button>`;
        }).join("");

        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
          <div class="card-title">${escapeHtml(title)}</div>
          <div class="card-desc">${escapeHtml(desc)}</div>
          <div class="controls">
            ${targetButtons}
            <button class="move" data-action="up" data-card-id="${card.id}" ${canUp ? "" : "disabled"}>↑</button>
            <button class="move" data-action="down" data-card-id="${card.id}" ${canDown ? "" : "disabled"}>↓</button>
          </div>
        `;
        list.appendChild(el);
      });

      section.appendChild(list);
      board.appendChild(section);
    }

    board.querySelectorAll("button[data-action]").forEach(btn => {
      btn.addEventListener("click", () => {
        const action = btn.getAttribute("data-action");
        const cardId = btn.getAttribute("data-card-id");
        if(action === "moveTo") moveToColumn(cardId, btn.getAttribute("data-target"));
        if(action === "up") moveWithin(cardId, -1);
        if(action === "down") moveWithin(cardId, 1);
      });
    });
  }

  render();
})();
</script>
